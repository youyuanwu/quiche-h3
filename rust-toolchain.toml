[toolchain]
# Pinned toolchain for local development. CI (.github/workflows/build.yaml)
# also exercises the MSRV (1.90) via its build matrix; this pin tracks the
# upper toolchain and is kept current by Dependabot (.github/dependabot.yml,
# package-ecosystem: "rust-toolchain").
channel = "1.97.1"
components = ["rustfmt", "clippy"]
