name: build

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  toolchain:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.read.outputs.channel }}
    steps:
    - uses: actions/checkout@v7
    - name: Read rust channel from rust-toolchain.toml
      id: read
      run: |
        channel=$(grep -oP 'channel\s*=\s*"\K[^"]+' rust-toolchain.toml)
        echo "channel=$channel" >> "$GITHUB_OUTPUT"

  build:
    needs: toolchain
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest ]
        # 1.90.0 is the MSRV; the second entry is the pinned toolchain read
        # from rust-toolchain.toml by the `toolchain` job.
        rust: [ "1.90.0", "${{ needs.toolchain.outputs.channel }}" ]
    steps:
    - uses: actions/checkout@v7

    # quiche builds BoringSSL from source, which requires CMake on every OS.
    - name: Get latest version of CMake
      uses: lukka/get-cmake@latest

    # BoringSSL's assembly requires NASM on Windows.
    - name: Install nasm (windows)
      if: runner.os == 'Windows'
      run: winget install nasm --accept-package-agreements --accept-source-agreements --disable-interactivity

    # The matrix already selects the exact toolchain (MSRV + the pinned channel),
    # so remove the file to keep `cargo +${{ matrix.rust }}` authoritative and
    # avoid conflicts with the rust cache.
    - name: Remove toolchain file to avoid conflict with rust cache
      shell: bash
      run: rm rust-toolchain.toml

    - name: Install rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy

    - name: Run Rust cache
      uses: Swatinem/rust-cache@v2

    - name: Run cargo check
      run: cargo +${{ matrix.rust }} check --all-targets

    - name: Run cargo fmt
      run: cargo +${{ matrix.rust }} fmt --all -- --check

    - name: Run cargo clippy
      run: cargo +${{ matrix.rust }} clippy --all-targets -- -D warnings

    - name: Run cargo build
      run: cargo +${{ matrix.rust }} build --all-targets

    - name: Run cargo test
      run: cargo +${{ matrix.rust }} test --all-targets

    # The loopback / end-to-end tests bind UDP sockets and run real QUIC
    # handshakes; they are #[ignore]d by default. Exercise them on Linux where
    # loopback networking in CI is reliable.
    - name: Run ignored loopback/e2e tests (linux)
      if: runner.os == 'Linux'
      run: cargo +${{ matrix.rust }} test --all-targets -- --ignored
